<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>İngilizce Helikopter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#111;font-family:'Segoe UI',sans-serif;user-select:none;touch-action:manipulation}
#wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0a0a14}
canvas{display:block;max-width:100%;max-height:100%}

#hud{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:flex;gap:8px;pointer-events:none;z-index:10;flex-wrap:wrap;justify-content:center}
.pill{background:rgba(0,0,0,0.65);border:1px solid rgba(255,255,255,0.12);border-radius:18px;padding:4px 13px;font-size:12px;font-weight:700;color:#fff;white-space:nowrap}
.pill span{color:#fbbf24}

#fsBtn{position:absolute;bottom:12px;right:12px;z-index:30;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.2);border-radius:8px;color:#fff;font-size:20px;padding:6px 10px;cursor:pointer;line-height:1}
#fsBtn:hover{background:rgba(0,0,0,0.8)}

#setOverlay{position:absolute;inset:0;background:rgba(5,10,30,0.93);z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:24px}
#setOverlay.show{display:flex}
#setOverlay h2{font-size:28px;color:#fbbf24;font-weight:900}
#setOverlay .big{font-size:42px;font-weight:900;color:#fff}
#setOverlay p{font-size:14px;color:#aac4ff;line-height:1.7;max-width:420px}
.ovl-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.ovl-btn{padding:12px 26px;border-radius:10px;border:none;font-size:14px;font-weight:800;cursor:pointer;font-family:'Segoe UI',sans-serif;letter-spacing:.5px;transition:transform .12s}
.ovl-btn:hover{transform:translateY(-2px)}
.btn-next{background:#22d3ee;color:#0a0a14}
.btn-retry{background:#f59e0b;color:#0a0a14}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>

  <div id="hud">
    <div class="pill">Set: <span id="pill-set">1</span></div>
    <div class="pill">Soru: <span id="pill-q">1</span>/10</div>
    <div class="pill">Skor: <span id="pill-skor">0</span></div>
    <div class="pill">Yanlış: <span id="pill-yanlis" style="color:#ef4444">0</span></div>
    <div class="pill" id="pill-timer">⏱ <span id="pill-sec">5</span></div>
  </div>

  <button id="fsBtn" title="Tam Ekran">⛶</button>

  <div id="setOverlay">
    <h2 id="ovl-title">Set Tamamlandı! 🎉</h2>
    <div class="big" id="ovl-skor">0</div>
    <p id="ovl-detail"></p>
    <div class="ovl-btns">
      <button class="ovl-btn btn-retry" id="ovl-retry" onclick="retryWrong()">↩ Yanlışları Tekrar Et</button>
      <button class="ovl-btn btn-next" onclick="nextSet()">Sonraki Set →</button>
    </div>
  </div>
</div>

// ─────────────────────────────────────────────────────────────────────────────
// SES
// ─────────────────────────────────────────────────────────────────────────────
let audioCtx=null;
function getAC(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }

function playCorrect(){
  const ac=getAC(), t=ac.currentTime;
  const mk=(type,f1,f2,g,dur,start=0)=>{
    const o=ac.createOscillator(),g2=ac.createGain();
    o.connect(g2); g2.connect(ac.destination);
    o.type=type; o.frequency.setValueAtTime(f1,t+start);
    if(f2) o.frequency.exponentialRampToValueAtTime(f2,t+start+dur*0.8);
    g2.gain.setValueAtTime(0,t+start); g2.gain.linearRampToValueAtTime(g,t+start+0.04);
    g2.gain.exponentialRampToValueAtTime(0.001,t+start+dur);
    o.start(t+start); o.stop(t+start+dur);
  };
  mk('sine',120,60,0.4,0.4); mk('sine',880,1100,0.3,0.5,0.04); mk('triangle',660,null,0.18,0.45,0.08);
  const b=ac.createBuffer(1,ac.sampleRate*0.08,ac.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  const s=ac.createBufferSource(),ng=ac.createGain(),f=ac.createBiquadFilter();
  f.type='bandpass'; f.frequency.value=400; f.Q.value=0.5;
  s.buffer=b; s.connect(f); f.connect(ng); ng.connect(ac.destination);
  ng.gain.setValueAtTime(0.22,t); ng.gain.exponentialRampToValueAtTime(0.001,t+0.1);
  s.start(t); s.stop(t+0.1);
}

function playWrong(){
  const ac=getAC(), t=ac.currentTime;
  const o1=ac.createOscillator(),g1=ac.createGain();
  o1.connect(g1); g1.connect(ac.destination);
  o1.type='sawtooth'; o1.frequency.setValueAtTime(220,t);
  o1.frequency.exponentialRampToValueAtTime(40,t+0.3);
  g1.gain.setValueAtTime(0.45,t); g1.gain.exponentialRampToValueAtTime(0.001,t+0.35);
  o1.start(t); o1.stop(t+0.35);
  const o2=ac.createOscillator(),g2=ac.createGain();
  o2.connect(g2); g2.connect(ac.destination);
  o2.type='square'; o2.frequency.setValueAtTime(440,t+0.02);
  o2.frequency.exponentialRampToValueAtTime(150,t+0.4);
  g2.gain.setValueAtTime(0,t); g2.gain.linearRampToValueAtTime(0.2,t+0.04);
  g2.gain.exponentialRampToValueAtTime(0.001,t+0.45);
  o2.start(t+0.02); o2.stop(t+0.5);
  const b=ac.createBuffer(1,ac.sampleRate*0.16,ac.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
  const s=ac.createBufferSource(),ng=ac.createGain(),f=ac.createBiquadFilter();
  f.type='lowpass'; f.frequency.value=600;
  s.buffer=b; s.connect(f); f.connect(ng); ng.connect(ac.destination);
  ng.gain.setValueAtTime(0.5,t); ng.gain.exponentialRampToValueAtTime(0.001,t+0.18);
  s.start(t); s.stop(t+0.18);
}

function playTimeup(){
  const ac=getAC(), t=ac.currentTime;
  const o=ac.createOscillator(),g=ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type='triangle'; o.frequency.setValueAtTime(300,t);
  o.frequency.exponentialRampToValueAtTime(80,t+0.4);
  g.gain.setValueAtTime(0.35,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
  o.start(t); o.stop(t+0.5);
}

// ─────────────────────────────────────────────────────────────────────────────
// CANVAS
// ─────────────────────────────────────────────────────────────────────────────
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=640, H=520;
canvas.width=W; canvas.height=H;

function resize(){
  const ww=window.innerWidth, wh=window.innerHeight, ar=W/H;
  let cw=ww, ch=ww/ar;
  if(ch>wh){ ch=wh; cw=wh*ar; }
  canvas.style.width=cw+'px'; canvas.style.height=ch+'px';
}
resize(); window.addEventListener('resize',resize);

document.getElementById('fsBtn').addEventListener('click',()=>{
  const el=document.documentElement;
  if(!document.fullscreenElement){
    (el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen).call(el);
    document.getElementById('fsBtn').textContent='✕';
  } else {
    (document.exitFullscreen||document.webkitExitFullscreen).call(document);
    document.getElementById('fsBtn').textContent='⛶';
  }
});
document.addEventListener('fullscreenchange',()=>{ if(!document.fullscreenElement) document.getElementById('fsBtn').textContent='⛶'; resize(); });

// ─────────────────────────────────────────────────────────────────────────────
// SABİTLER
// ─────────────────────────────────────────────────────────────────────────────
const VARIL_COUNT=4;
const VW=100, VH=80;
const YERDEN=H-85;
const HELI_Y=105;
const SET_SIZE=10;
const SURE=8;

// ─────────────────────────────────────────────────────────────────────────────
// DURUM
// ─────────────────────────────────────────────────────────────────────────────
let state='start';
let skor=0, setNo=1, qNo=0;
let heliWord='', dogruCevap='';
let variller=[], mermi=null, particles=[], flashMsg={text:'',color:'#fff',timer:0};
let heli={x:W/2, vx:1.5, rotorAngle:0, shake:0};
let animId;
let timer=SURE, timerStart=0, timerActive=false;
let setPool=[], wrongPairs=[], setScore=0;
let usedAll=new Set();
let lastTime=0;

// ─────────────────────────────────────────────────────────────────────────────
// YARDIMCILAR
// ─────────────────────────────────────────────────────────────────────────────
function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]; } return b; }

function updateHUD(){
  document.getElementById('pill-set').textContent=setNo;
  document.getElementById('pill-q').textContent=qNo+1;
  document.getElementById('pill-skor').textContent=skor;
  document.getElementById('pill-yanlis').textContent=wrongPairs.length;
  document.getElementById('pill-sec').textContent=Math.max(0,Math.ceil(timer));
}

function showFlash(t,c){ flashMsg={text:t,color:c,timer:65}; }

// ─────────────────────────────────────────────────────────────────────────────
// SET YÖNETİMİ
// ─────────────────────────────────────────────────────────────────────────────
function startNewSet(pairs){
  setPool=shuffle(pairs).slice(0,SET_SIZE);
  wrongPairs=[]; setScore=0; qNo=0;
  loadQuestion(setPool[0]);
}

function loadQuestion(pair){
  // İngilizce heli'de, Türkçe varillerde
  heliWord  = pair[0];
  dogruCevap= pair[1];

  const dist=[];
  const pool=shuffle([...KELIMELER]);
  for(const p of pool){
    const tr=p[1];
    if(tr!==dogruCevap && !dist.includes(tr)){
      dist.push(tr);
      if(dist.length>=VARIL_COUNT-1) break;
    }
  }

  const words=shuffle([dogruCevap,...dist.slice(0,VARIL_COUNT-1)]);
  const sp=W/(VARIL_COUNT+1);
  variller=words.map((w,i)=>({x:sp*(i+1),y:YERDEN,word:w,hit:false,wobble:0}));
  mermi=null; particles=[];
  timer=SURE; timerStart=performance.now(); timerActive=true;
  updateHUD();
}

function onAnswer(correct, pair){
  timerActive=false;
  if(correct){
    const bonus=10+setNo*2; skor+=bonus; setScore+=bonus;
    playCorrect(); showFlash('+'+bonus+' Doğru! 🎯','#4ade80');
  } else {
    wrongPairs.push(pair);
    playWrong(); showFlash('Yanlış! ✗','#f87171');
  }
  updateHUD();
  setTimeout(()=>{
    qNo++;
    if(qNo>=SET_SIZE) showSetEnd();
    else loadQuestion(setPool[qNo]);
  }, correct?700:800);
}

function onTimeout(){
  timerActive=false;
  wrongPairs.push(setPool[qNo]);
  playTimeup(); showFlash('Süre Doldu! ⏰','#fb923c');
  updateHUD();
  setTimeout(()=>{
    qNo++;
    if(qNo>=SET_SIZE) showSetEnd();
    else loadQuestion(setPool[qNo]);
  }, 900);
}

function showSetEnd(){
  state='setend'; cancelAnimationFrame(animId);
  const correct=SET_SIZE-wrongPairs.length;
  const pct=Math.round(correct/SET_SIZE*100);
  document.getElementById('ovl-title').textContent=
    pct===100?'Mükemmel Set! 🏆':pct>=70?'Set Tamamlandı! 🎉':'Set Bitti 📚';
  document.getElementById('ovl-skor').textContent='+'+setScore+' puan';
  document.getElementById('ovl-detail').innerHTML=
    `<b>10 Soru / ${correct} Doğru / ${wrongPairs.length} Yanlış</b><br>
     Toplam Skor: <b>${skor}</b><br>
     ${wrongPairs.length>0?'⚠ '+wrongPairs.length+' yanlış cevabın var — tekrar dene!':'✅ Tüm cevaplar doğru!'}`;
  document.getElementById('ovl-retry').style.display=wrongPairs.length>0?'block':'none';
  document.getElementById('setOverlay').classList.add('show');
}

function nextSet(){
  document.getElementById('setOverlay').classList.remove('show');
  setNo++;
  setPool.forEach(p=>usedAll.add(p[0]));
  let pool=KELIMELER.filter(p=>!usedAll.has(p[0]));
  if(pool.length<SET_SIZE){ usedAll.clear(); pool=[...KELIMELER]; }
  state='playing';
  startNewSet(pool);
  lastTime=0; animId=requestAnimationFrame(loop);
}

function retryWrong(){
  document.getElementById('setOverlay').classList.remove('show');
  const toRetry=[...wrongPairs];
  wrongPairs=[]; setScore=0; qNo=0;
  setPool=shuffle(toRetry).slice(0,SET_SIZE);
  state='playing';
  loadQuestion(setPool[0]);
  updateHUD(); lastTime=0; animId=requestAnimationFrame(loop);
}

function startGame(){
  usedAll.clear(); skor=0; setNo=1; state='playing';
  startNewSet([...KELIMELER]);
  lastTime=0; animId=requestAnimationFrame(loop);
}

// ─────────────────────────────────────────────────────────────────────────────
// INPUT
// ─────────────────────────────────────────────────────────────────────────────
function handleClick(clientX){
  if(state==='start'){ startGame(); return; }
  if(state!=='playing'||mermi) return;
  const rect=canvas.getBoundingClientRect();
  const mx=(clientX-rect.left)*(W/rect.width);
  let best=null, bestD=Infinity;
  for(const v of variller){
    if(v.hit) continue;
    const d=Math.abs(v.x-mx);
    if(d<bestD){ bestD=d; best=v; }
  }
  if(!best) return;
  mermi={x:heli.x,y:HELI_Y+32,tx:best.x,ty:best.y-VH/2,target:best,progress:0};
}
canvas.addEventListener('click',e=>handleClick(e.clientX));
canvas.addEventListener('touchstart',e=>{ e.preventDefault(); handleClick(e.touches[0].clientX); },{passive:false});

// ─────────────────────────────────────────────────────────────────────────────
// LOOP
// ─────────────────────────────────────────────────────────────────────────────
function loop(ts){
  const dt=(ts-(lastTime||ts))/1000; lastTime=ts;
  update(dt); draw();
  if(state==='playing') animId=requestAnimationFrame(loop);
}

function update(dt){
  const spd=1.5+setNo*0.1;
  heli.x+=heli.vx*spd;
  if(heli.x>W-65) heli.vx=-Math.abs(heli.vx);
  if(heli.x<65)   heli.vx= Math.abs(heli.vx);
  heli.rotorAngle+=0.25;
  if(heli.shake>0) heli.shake-=0.6;
  variller.forEach(v=>{ if(v.wobble>0) v.wobble*=0.82; });

  if(timerActive){
    timer=SURE-(performance.now()-timerStart)/1000;
    if(timer<=0){ timer=0; onTimeout(); }
    updateHUD();
  }

  if(mermi){
    mermi.progress+=0.05;
    mermi.x=heli.x+(mermi.tx-heli.x)*mermi.progress;
    mermi.y=(HELI_Y+32)+(mermi.ty-(HELI_Y+32))*mermi.progress;
    if(mermi.progress>=1){
      const v=mermi.target;
      if(!v.hit){
        v.hit=true;
        const correct=v.word===dogruCevap;
        if(correct){ spawnP(v.x,v.y,'#22d3ee',28); }
        else { v.wobble=10; heli.shake=10; spawnP(v.x,v.y,'#ef4444',20); }
        onAnswer(correct, setPool[qNo]);
      }
      mermi=null;
    }
  }

  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.life-=1; p.r*=0.96; });
  particles=particles.filter(p=>p.life>0);
  if(flashMsg.timer>0) flashMsg.timer--;
}

function spawnP(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=1.5+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:28+Math.random()*18,r:3+Math.random()*4,col});
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// DRAW
// ─────────────────────────────────────────────────────────────────────────────
function draw(){
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0b1630'); sky.addColorStop(0.65,'#162848'); sky.addColorStop(1,'#1e3d1e');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  if(!draw._stars) draw._stars=Array.from({length:60},()=>({x:Math.random()*W,y:Math.random()*(H*0.55),r:Math.random()*1.5+0.3}));
  draw._stars.forEach(s=>{ ctx.fillStyle=`rgba(255,255,255,${0.3+Math.random()*0.15})`; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); });

  drawGround(); drawVariller(); drawHeli(); drawMermi();
  drawParticles(); drawHeliBubble(); drawTimer(); drawFlash();
  if(state==='start') drawStart();
}

function drawGround(){
  ctx.fillStyle='#1e3a18'; ctx.fillRect(0,H-82,W,82);
  ctx.fillStyle='#2a2218'; ctx.fillRect(0,H-66,W,50);
  ctx.setLineDash([28,18]); ctx.strokeStyle='rgba(255,255,180,0.18)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(0,H-44); ctx.lineTo(W,H-44); ctx.stroke(); ctx.setLineDash([]);
}

function wrapWord(ctx,word,maxW,fs){
  ctx.font=`bold ${fs}px Segoe UI`;
  if(ctx.measureText(word).width<=maxW) return [word];
  const sp=word.indexOf(' ');
  if(sp>0) return [word.slice(0,sp), word.slice(sp+1)];
  const m=Math.ceil(word.length/2);
  return [word.slice(0,m)+'-', word.slice(m)];
}

function drawVariller(){
  variller.forEach(v=>{
    if(v.hit && v.word===dogruCevap) return;
    const ox=v.wobble?Math.sin(Date.now()*0.05)*v.wobble:0;
    ctx.save(); ctx.translate(v.x+ox,v.y);

    ctx.fillStyle='rgba(0,0,0,0.22)';
    ctx.beginPath(); ctx.ellipse(0,VH/2+3,VW*0.42,7,0,0,Math.PI*2); ctx.fill();

    const g=ctx.createLinearGradient(-VW/2,0,VW/2,0);
    const bc=v.hit?'#666':'#b03020', bc2=v.hit?'#444':'#7a1c10';
    g.addColorStop(0,bc2); g.addColorStop(0.3,bc); g.addColorStop(0.7,bc); g.addColorStop(1,bc2);
    ctx.fillStyle=g; ctx.beginPath(); ctx.roundRect(-VW/2,-VH/2,VW,VH,[10,10,5,5]); ctx.fill();

    ctx.strokeStyle=v.hit?'#888':'#5a100a'; ctx.lineWidth=5;
    [-VH*0.28,0,VH*0.28].forEach(oy=>{ ctx.beginPath(); ctx.moveTo(-VW/2+4,oy); ctx.lineTo(VW/2-4,oy); ctx.stroke(); });

    ctx.fillStyle=v.hit?'#777':'#8a1a10';
    ctx.beginPath(); ctx.ellipse(0,-VH/2,VW/2,8,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.07)'; ctx.fillRect(-VW/2+6,-VH/2+10,12,VH-18);

    // etiket
    const lblW=VW-12, lblH=44;
    ctx.fillStyle='rgba(255,255,255,0.93)';
    ctx.beginPath(); ctx.roundRect(-lblW/2,-lblH/2+2,lblW,lblH,6); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.1)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(-lblW/2,-lblH/2+2,lblW,lblH,6); ctx.stroke();

    ctx.fillStyle='#1a1a2e'; ctx.textAlign='center'; ctx.textBaseline='middle';
    const lines=wrapWord(ctx,v.word,lblW-10,12);
    const lh=15, total=lines.length*lh;
    lines.forEach((line,i)=>{
      const fs=line.length>12?9:line.length>8?11:12;
      ctx.font=`bold ${fs}px Segoe UI`;
      ctx.fillText(line,0,-total/2+i*lh+lh/2+2);
    });
    ctx.restore();
  });
}

function drawHeli(){
  const sx=heli.shake>0?(Math.random()-0.5)*heli.shake*0.5:0;
  const sy=heli.shake>0?(Math.random()-0.5)*heli.shake*0.25:0;
  const x=heli.x+sx, y=HELI_Y+sy;
  ctx.save(); ctx.translate(x,y);

  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(4,H-y-18,46,7,0,0,Math.PI*2); ctx.fill();

  const tg=ctx.createLinearGradient(30,30,108,46);
  tg.addColorStop(0,'#4a5568'); tg.addColorStop(0.5,'#718096'); tg.addColorStop(1,'#2d3748');
  ctx.fillStyle=tg;
  ctx.beginPath(); ctx.moveTo(34,33); ctx.lineTo(106,25); ctx.lineTo(106,38); ctx.lineTo(34,48); ctx.closePath(); ctx.fill();

  ctx.fillStyle='#2d3748';
  ctx.beginPath(); ctx.moveTo(98,14); ctx.lineTo(110,14); ctx.lineTo(110,28); ctx.lineTo(98,28); ctx.closePath(); ctx.fill();

  ctx.save(); ctx.translate(110,21);
  ctx.fillStyle='#555'; ctx.beginPath(); ctx.arc(0,0,4,0,Math.PI*2); ctx.fill();
  ctx.save(); ctx.rotate(heli.rotorAngle*2.1);
  for(let i=0;i<3;i++){
    ctx.rotate(Math.PI*2/3);
    const tg2=ctx.createLinearGradient(0,0,0,14);
    tg2.addColorStop(0,'#718096'); tg2.addColorStop(1,'#2d3748');
    ctx.fillStyle=tg2; ctx.fillRect(-2,0,4,14);
  }
  ctx.restore(); ctx.fillStyle='#888'; ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fill();
  ctx.restore();

  const bg=ctx.createLinearGradient(-44,8,44,58);
  bg.addColorStop(0,'#4a5c3a'); bg.addColorStop(0.3,'#5d7347'); bg.addColorStop(0.65,'#4a5c3a'); bg.addColorStop(1,'#2e3d24');
  ctx.fillStyle=bg;
  ctx.beginPath();
  ctx.moveTo(-42,30); ctx.bezierCurveTo(-52,28,-52,14,-38,12);
  ctx.lineTo(-18,8); ctx.lineTo(26,8); ctx.bezierCurveTo(44,8,48,16,46,26);
  ctx.lineTo(44,50); ctx.bezierCurveTo(44,58,36,60,26,60);
  ctx.lineTo(-28,60); ctx.bezierCurveTo(-46,60,-50,52,-42,44);
  ctx.closePath(); ctx.fill();

  ctx.fillStyle='#2d3748';
  ctx.beginPath(); ctx.moveTo(-22,12); ctx.bezierCurveTo(-36,14,-40,36,-30,56);
  ctx.lineTo(22,56); ctx.bezierCurveTo(32,36,28,14,14,12); ctx.closePath(); ctx.fill();
  const gg=ctx.createLinearGradient(-20,14,18,52);
  gg.addColorStop(0,'rgba(160,220,255,0.72)'); gg.addColorStop(0.4,'rgba(100,190,240,0.55)'); gg.addColorStop(1,'rgba(40,80,140,0.65)');
  ctx.fillStyle=gg;
  ctx.beginPath(); ctx.moveTo(-18,15); ctx.bezierCurveTo(-30,17,-34,36,-26,54);
  ctx.lineTo(18,54); ctx.bezierCurveTo(26,36,22,17,10,15); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.26)';
  ctx.beginPath(); ctx.moveTo(-12,18); ctx.bezierCurveTo(-22,22,-24,36,-18,46);
  ctx.lineTo(-8,30); ctx.bezierCurveTo(-4,22,-2,18,-12,18); ctx.closePath(); ctx.fill();

  ctx.fillStyle='rgba(10,20,40,0.5)';
  ctx.beginPath(); ctx.ellipse(-4,36,9,11,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(-4,24,6,0,Math.PI*2); ctx.fill();

  ctx.strokeStyle='#3a3a3a'; ctx.lineWidth=3; ctx.lineCap='round';
  [[-28,58,-28,72],[8,58,8,72],[-10,58,-10,80],[24,58,24,80]].forEach(([x1,y1,x2,y2])=>{ ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); });
  ctx.strokeStyle='#555'; ctx.lineWidth=3.5;
  ctx.beginPath(); ctx.moveTo(-38,72); ctx.lineTo(18,72); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-20,80); ctx.lineTo(34,80); ctx.stroke();
  ctx.strokeStyle='rgba(80,80,80,0.8)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(-28,58); ctx.lineTo(-10,80); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(8,58); ctx.lineTo(24,80); ctx.stroke();

  ctx.fillStyle='#333'; ctx.fillRect(-4,0,8,12);
  ctx.fillStyle='#555'; ctx.fillRect(-6,3,12,4);
  ctx.save(); ctx.translate(0,3); ctx.rotate(heli.rotorAngle);
  for(let i=0;i<3;i++){
    ctx.rotate(Math.PI*2/3); ctx.save();
    ctx.beginPath(); ctx.moveTo(-3,0); ctx.lineTo(-1,-66); ctx.lineTo(1,-66); ctx.lineTo(3,0); ctx.closePath();
    const br=ctx.createLinearGradient(0,0,0,-66);
    br.addColorStop(0,'#4a4a3a'); br.addColorStop(0.5,'#6a6a5a'); br.addColorStop(1,'#3a3a2a');
    ctx.fillStyle=br; ctx.fill(); ctx.restore();
  }
  const hr=ctx.createRadialGradient(0,0,1,0,0,8);
  hr.addColorStop(0,'#aaa'); hr.addColorStop(1,'#444');
  ctx.fillStyle=hr; ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fill();
  ctx.restore();

  const nt=Date.now()*0.006;
  ctx.shadowBlur=8;
  ctx.fillStyle=`rgba(255,60,60,${0.5+Math.sin(nt)*0.5})`; ctx.shadowColor='#f00';
  ctx.beginPath(); ctx.arc(-42,32,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=`rgba(60,255,100,${0.5+Math.sin(nt+Math.PI)*0.5})`; ctx.shadowColor='#0f0';
  ctx.beginPath(); ctx.arc(38,32,3,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.restore();
}

function drawHeliBubble(){
  if(state!=='playing') return;
  const x=heli.x, y=HELI_Y;
  const bw=Math.max(72, heliWord.length*7+24), bh=22;
  ctx.save(); ctx.translate(x,y+70);
  ctx.fillStyle='rgba(255,240,130,0.96)';
  ctx.beginPath(); ctx.moveTo(-8,-bh); ctx.lineTo(0,-bh-12); ctx.lineTo(8,-bh); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.roundRect(-bw,-bh,bw*2,bh*2,10); ctx.fill();
  ctx.strokeStyle='rgba(190,150,0,0.7)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(-bw,-bh,bw*2,bh*2,10); ctx.stroke();
  ctx.fillStyle='#1a1a00'; ctx.font='bold 15px Segoe UI';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(heliWord,0,2);
  ctx.fillStyle='rgba(100,80,0,0.65)'; ctx.font='9px Segoe UI';
  ctx.fillText('Türkçesi nedir?',0,bh-5);
  ctx.restore();
}

function drawTimer(){
  if(state!=='playing') return;
  const sec=Math.max(0,Math.ceil(timer)), pct=timer/SURE;
  const cx=36, cy=36, r=24;
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fill();
  const col=pct>0.5?'#4ade80':pct>0.25?'#fbbf24':'#ef4444';
  ctx.strokeStyle=col; ctx.lineWidth=5; ctx.shadowColor=col; ctx.shadowBlur=8;
  ctx.beginPath(); ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+Math.PI*2*pct); ctx.stroke();
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff'; ctx.font=`bold 22px Segoe UI`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(sec,cx,cy);
  ctx.restore();
}

function drawMermi(){
  if(!mermi) return;
  ctx.save();
  ctx.globalAlpha=0.35; ctx.strokeStyle='#fbbf24'; ctx.lineWidth=2; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(heli.x,HELI_Y+32); ctx.lineTo(mermi.x,mermi.y); ctx.stroke();
  ctx.setLineDash([]); ctx.globalAlpha=1;
  ctx.fillStyle='#fbbf24'; ctx.shadowColor='#fbbf24'; ctx.shadowBlur=10;
  ctx.beginPath(); ctx.arc(mermi.x,mermi.y,5,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0; ctx.restore();
}

function drawParticles(){
  particles.forEach(p=>{ ctx.globalAlpha=p.life/40; ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); });
  ctx.globalAlpha=1;
}

function drawFlash(){
  if(flashMsg.timer<=0) return;
  const a=Math.min(flashMsg.timer/18,1);
  ctx.globalAlpha=a; ctx.fillStyle=flashMsg.color;
  ctx.font='bold 24px Segoe UI'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor=flashMsg.color; ctx.shadowBlur=18;
  ctx.fillText(flashMsg.text,W/2,H/2-24);
  ctx.shadowBlur=0; ctx.globalAlpha=1;
}

function drawStart(){
  ctx.fillStyle='rgba(5,10,28,0.86)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#fbbf24'; ctx.font='bold 34px Segoe UI';
  ctx.fillText('🚁 İngilizce Helikopter',W/2,H/2-90);
  ctx.fillStyle='#aac4ff'; ctx.font='15px Segoe UI';
  ctx.fillText('Her sette 10 soru — 5 saniyen var!',W/2,H/2-52);
  ctx.fillText('İngilizce kelimeyi görüp Türkçesine tıkla.',W/2,H/2-28);
  ctx.fillStyle='#fca5a5'; ctx.font='13px Segoe UI';
  ctx.fillText('Set bitince skor ve yanlışlar gösterilir.',W/2,H/2+4);
  ctx.fillStyle='rgba(255,255,255,0.88)'; ctx.font='bold 16px Segoe UI';
  ctx.fillText('▶  Başlamak için tıkla / dokun',W/2,H/2+52);
}

// ─────────────────────────────────────────────────────────────────────────────
// İLK ÇERÇEVE
// ─────────────────────────────────────────────────────────────────────────────
state='start';
(function idleLoop(){
  heli.x+=heli.vx; heli.rotorAngle+=0.25;
  if(heli.x>W-65) heli.vx=-Math.abs(heli.vx);
  if(heli.x<65)   heli.vx= Math.abs(heli.vx);
  draw();
  if(state==='start') requestAnimationFrame(idleLoop);
})();
</script>
