<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Kur'an Sure Tanıma</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

html,body{
  height:100%;
  width:100%;
  overflow:hidden;
  font-family:'Segoe UI','Tahoma',serif;
  background:#0a1f10;
}

/* ══ ANA ÇERÇEVE: ekranın %95'i ══ */
.frame{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:2vh 2vw;
}

/* ══ KİTAP SAYFASI ══ */
.page{
  width:100%;
  height:95vh;
  max-width:860px;
  background:linear-gradient(160deg,#fdf6e0 0%,#f4e8c0 55%,#ecdba0 100%);
  border-radius:4px 18px 18px 4px;
  box-shadow:
    -8px 0 0 #b8920a,
    0 0 0 3px #c9a520,
    8px 14px 60px rgba(0,0,0,.65),
    -2px 2px 20px rgba(0,0,0,.3);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  position:relative;
}

/* Sayfa çizgi dokusu */
.page::before{
  content:'';
  position:absolute;
  inset:0;
  background-image:repeating-linear-gradient(
    transparent,
    transparent 39px,
    rgba(160,130,40,.13) 39px,
    rgba(160,130,40,.13) 40px
  );
  pointer-events:none;
  z-index:0;
}

/* Sol kenar kırmızı çizgi (klasik defter) */
.page::after{
  content:'';
  position:absolute;
  top:0; bottom:0; left:52px;
  width:1.5px;
  background:rgba(200,80,60,.25);
  z-index:1;
}

/* ══ ÜST BAR: HUD + Dinle ══ */
.top-bar{
  position:relative;
  z-index:2;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 18px 8px 20px;
  border-bottom:1.5px solid rgba(160,130,40,.25);
  background:rgba(255,248,220,.55);
  flex-shrink:0;
  flex-wrap:wrap;
  gap:6px;
}

.hud-left{
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}
.hud-chip{
  background:rgba(80,50,5,.08);
  border:1px solid rgba(160,120,20,.3);
  border-radius:30px;
  padding:3px 12px;
  font-size:.78rem;
  font-weight:700;
  color:#4a3205;
}
.score-chip{
  background:#1a4f2e;
  color:#c8f0a0;
  border:1px solid #2a7040;
}

.hud-right{
  display:flex;
  align-items:center;
  gap:8px;
}
.listen-btn{
  background:#2a6040;
  border:none;
  color:#e0f8d0;
  font-size:.8rem;
  padding:6px 14px;
  border-radius:30px;
  cursor:pointer;
  font-weight:700;
  font-family:inherit;
  display:flex;
  align-items:center;
  gap:6px;
  transition:.15s;
  box-shadow:0 2px 6px rgba(0,0,0,.2);
}
.listen-btn:hover{background:#3a8050;}
.listen-btn:active{transform:scale(.96);}
.listen-btn.playing{
  background:#8a2a1a;
  box-shadow:0 0 20px rgba(200,50,20,.4);
}

.reset-btn{
  background:transparent;
  border:1px solid rgba(160,120,20,.4);
  color:#6a4a08;
  border-radius:30px;
  padding:5px 12px;
  font-size:.76rem;
  cursor:pointer;
  font-family:inherit;
  font-weight:700;
  transition:.15s;
}
.reset-btn:hover{background:rgba(160,120,20,.12);}

/* ══ KİTAP İÇ ALANI ══ */
.page-body{
  position:relative;
  z-index:2;
  flex:1;
  display:flex;
  flex-direction:column;
  padding:0 20px 12px 60px;
  overflow:hidden;
  min-height:0;
}

/* ══ ARAPÇA METİN ALANI ══ */
.arabic-section{
  flex:0 0 auto;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:16px 8px 12px 0;
  border-bottom:1.5px solid rgba(160,130,40,.22);
  min-height:0;
}

.sure-label{
  font-size:.72rem;
  font-weight:700;
  color:#8a6520;
  letter-spacing:.8px;
  text-transform:uppercase;
  margin-bottom:12px;
  opacity:.8;
}

.arabic-text{
  direction:rtl;
  font-family:'Amiri','Traditional Arabic','Scheherazade New','Times New Roman',serif;
  color:#1a2010;
  text-align:right;
  line-height:1.8;
}

.ayet-line{
  display:block;
  margin-bottom:6px;
  padding-bottom:6px;
  border-bottom:1px solid rgba(160,130,40,.12);
}
.ayet-line:last-child{
  border-bottom:none;
  margin-bottom:0;
}

/* ══ SORU + SEÇENEKLER ALANI ══ */
.question-section{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:14px 0 8px;
  min-height:0;
  overflow:hidden;
}

.question-label{
  font-size:.8rem;
  font-weight:700;
  color:#6a4a08;
  margin-bottom:10px;
  opacity:.85;
}

.options{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:8px;
  overflow-y:auto;
  padding-right:4px;
}

.opt-btn{
  background:rgba(30,60,20,.85);
  border:1.5px solid rgba(80,160,60,.45);
  border-radius:50px;
  padding:0;
  font-size:1rem;
  font-weight:800;
  color:#c8f0a0;
  cursor:pointer;
  text-align:center;
  transition:.15s;
  font-family:inherit;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:44px;
  padding:10px 18px;
  flex-shrink:0;
  letter-spacing:1.5px;
  text-transform:uppercase;
}
.opt-btn:hover:not([disabled]){
  background:rgba(40,90,25,.95);
  border-color:rgba(120,220,80,.7);
  color:#e8ffe0;
}
.opt-correct{
  background:#1a6bc4 !important;
  border-color:#4a9eff !important;
  color:#ffffff !important;
  letter-spacing:1.5px;
  box-shadow:0 0 30px rgba(26,107,196,.5);
}
.opt-wrong{
  background:#6b1f12 !important;
  border-color:#e07060 !important;
  color:#ffd8d0 !important;
  text-decoration:line-through;
  letter-spacing:1.5px;
}
.opt-btn[disabled]{cursor:default;}

/* ══ ALKIŞ EFEKTİ ══ */
.confetti-container{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:9999;
  overflow:hidden;
}
.confetti{
  position:absolute;
  width:10px;
  height:10px;
  top:-10px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall{
  0%{ transform:translateY(0) rotate(0deg) scale(1); opacity:1; }
  100%{ transform:translateY(110vh) rotate(720deg) scale(0.3); opacity:0; }
}

/* ══ ALT BİLGİ SATIRI ══ */
.bottom-bar{
  position:relative;
  z-index:2;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:8px 18px 10px 60px;
  border-top:1.5px solid rgba(160,130,40,.22);
  background:rgba(255,248,220,.4);
  flex-shrink:0;
  flex-wrap:wrap;
  gap:8px;
}

.feedback{
  font-size:.82rem;
  font-weight:600;
  color:#5a3e08;
  flex:1;
  min-width:0;
}

.next-btn{
  background:linear-gradient(135deg,#9e6610,#c8900c);
  border:none;
  padding:8px 22px;
  font-size:.88rem;
  font-weight:800;
  border-radius:40px;
  color:#fff8e0;
  cursor:pointer;
  font-family:inherit;
  letter-spacing:.3px;
  box-shadow:0 3px 0 #6a4408, 0 4px 12px rgba(0,0,0,.25);
  transition:.12s;
  white-space:nowrap;
  flex-shrink:0;
}
.next-btn:hover{background:linear-gradient(135deg,#b87812,#e0a814);}
.next-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #6a4408;}
.next-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}

/* ══ FONT BOYUTU ══ */
@media(min-height:700px){
  .arabic-text{ font-size:clamp(1.4rem,3.2vh,2.2rem); }
  .arabic-section{ flex: 0 0 52%; }
}
@media(max-height:699px) and (min-height:500px){
  .arabic-text{ font-size:clamp(1.1rem,2.8vh,1.7rem); }
  .arabic-section{ flex: 0 0 48%; }
}
@media(max-height:499px){
  .arabic-text{ font-size:1rem; line-height:1.6; }
  .arabic-section{ flex: 0 0 44%; }
  .opt-btn{ min-height:36px; font-size:.85rem; }
}
@media(min-width:600px){
  .page-body{ padding-left:70px; padding-right:28px; }
}
/* ══ İLK AYET LİSTESİ BUTONU ══ */
.list-btn{
  background:#3a4a8a;
  border:none;
  color:#dde4ff;
  font-size:.8rem;
  padding:6px 14px;
  border-radius:30px;
  cursor:pointer;
  font-weight:700;
  font-family:inherit;
  transition:.15s;
  box-shadow:0 2px 6px rgba(0,0,0,.2);
}
.list-btn:hover{background:#4a5aa8;}
.list-btn:active{transform:scale(.96);}

/* ══ LİSTE OVERLAY ══ */
.list-overlay{
  display:none;
  position:fixed;
  inset:0;
  z-index:10000;
  background:rgba(10,20,12,.75);
  backdrop-filter:blur(3px);
  align-items:center;
  justify-content:center;
  padding:3vh 3vw;
}
.list-overlay.open{ display:flex; }

.list-card{
  width:100%;
  max-width:760px;
  height:90vh;
  background:linear-gradient(160deg,#fdf6e0 0%,#f4e8c0 55%,#ecdba0 100%);
  border-radius:14px;
  box-shadow:0 0 0 3px #c9a520, 0 20px 60px rgba(0,0,0,.6);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.list-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 18px;
  border-bottom:1.5px solid rgba(160,130,40,.3);
  background:rgba(255,248,220,.6);
  flex-shrink:0;
}
.list-title{
  font-size:1rem;
  font-weight:800;
  color:#4a3205;
}
.list-close{
  background:#8a2a1a;
  border:none;
  color:#ffe0d8;
  font-size:.82rem;
  font-weight:700;
  padding:7px 16px;
  border-radius:30px;
  cursor:pointer;
  font-family:inherit;
  transition:.15s;
}
.list-close:hover{background:#a83a26;}
.list-close:active{transform:scale(.96);}

.list-body{
  flex:1;
  overflow-y:auto;
  padding:10px 16px 18px;
}

.list-item{
  display:flex;
  align-items:flex-start;
  gap:12px;
  padding:12px 6px;
  border-bottom:1px solid rgba(160,130,40,.18);
}
.list-item:last-child{ border-bottom:none; }

.list-num{
  flex-shrink:0;
  width:30px;
  height:30px;
  border-radius:50%;
  background:#1a4f2e;
  color:#c8f0a0;
  font-size:.8rem;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-top:4px;
}
.list-meta{
  flex:1;
  min-width:0;
}
.list-name{
  font-size:.9rem;
  font-weight:800;
  color:#5a3e08;
  margin-bottom:6px;
}
.list-ayet{
  direction:rtl;
  text-align:right;
  font-family:'Amiri','Traditional Arabic','Scheherazade New','Times New Roman',serif;
  font-size:1.35rem;
  line-height:1.9;
  color:#1a2010;
  margin-bottom:8px;
  padding-bottom:8px;
  border-bottom:1px dashed rgba(160,130,40,.2);
}
.list-ayet:last-child{
  margin-bottom:0;
  padding-bottom:0;
  border-bottom:none;
}
.list-ayet-no{
  color:#9a7010;
  font-size:.72em;
  margin-left:6px;
  direction:ltr;
  display:inline-block;
}
@media(max-width:600px){
  .list-ayet{ font-size:1.15rem; }
  .list-name{ font-size:.82rem; }
}

</style>
</head>
<body>

<div class="frame">
<div class="page">

  <!-- ÜST BAR -->
  <div class="top-bar">
    <div class="hud-left">
      <div class="hud-chip">📖 Soru <span id="qNum">1</span>/<span id="qTotal">10</span></div>
      <div class="hud-chip score-chip">⭐ <span id="scoreNum">0</span> puan</div>
    </div>
    <div class="hud-right">
      <button class="list-btn" id="listBtn">📋 İlk İki Ayet Listesi</button>
      <button class="listen-btn" id="listenBtn">🔊 Sesli Dinle</button>
      <button class="reset-btn" id="resetBtn">🔄 Yeni Set</button>
    </div>
  </div>

  <!-- KİTAP GÖVDE -->
  <div class="page-body">

    <!-- ARAPÇA ALAN -->
    <div class="arabic-section">
      <div class="sure-label" id="sureLabel">✨ İlk 3 Ayet · Arapça</div>
      <div class="arabic-text" id="arabicVerses"></div>
    </div>

    <!-- SORU + SEÇENEKLER -->
    <div class="question-section">
      <div class="question-label">🌙 Bu hangi sure?</div>
      <div class="options" id="optionsContainer"></div>
    </div>

  </div><!-- /page-body -->

  <!-- ALT BAR -->
  <div class="bottom-bar">
    <div class="feedback" id="feedbackMsg">💡 Bir cevap seçin</div>
    <button class="next-btn" id="nextBtn">⏩ Sonraki</button>
  </div>

</div><!-- /page -->
  <!-- İLK AYET LİSTESİ OVERLAY -->
  <div class="list-overlay" id="listOverlay">
    <div class="list-card">
      <div class="list-head">
        <div class="list-title">📋 Surelerin İlk İki Ayeti</div>
        <button class="list-close" id="listCloseBtn">✕ Kapat</button>
      </div>
      <div class="list-body" id="listBody"></div>
    </div>
  </div>

</div><!-- /frame -->

<script>
// ── VERİTABANI ───────────────────────────────────────────────────────────────
const DB = [
  {id:1, name:"Fatiha", ar:"بِسۡمِ ٱللَّهِ ٱلرَّحۡمَٰنِ ٱلرَّحِيمِ|ٱلۡحَمۡدُ لِلَّهِ رَبِّ ٱلۡعَٰلَمِينَ|ٱلرَّحۡمَٰنِ ٱلرَّحِيمِ"},
  {id:2, name:"Bakara", ar:"الٓمٓ|ذَٰلِكَ ٱلۡكِتَٰبُ لَا رَيۡبَۛ فِيهِۛ هُدٗى لِّلۡمُتَّقِينَ|ٱلَّذِينَ يُؤۡمِنُونَ بِٱلۡغَيۡبِ وَيُقِيمُونَ ٱلصَّلَوٰةَ وَمِمَّا رَزَقۡنَٰهُمۡ يُنفِقُونَ"},
  {id:3, name:"Âl-i İmrân", ar:"الٓمٓ|ٱللَّهُ لَآ إِلَٰهَ إِلَّا هُوَ ٱلۡحَيُّ ٱلۡقَيُّومُ|نَزَّلَ عَلَيۡكَ ٱلۡكِتَٰبَ بِٱلۡحَقِّ مُصَدِّقٗا لِّمَا بَيۡنَ يَدَيۡهِ وَأَنزَلَ ٱلتَّوۡرَىٰةَ وَٱلۡإِنجِيلَ"},
  {id:4, name:"Nisâ", ar:"يَـٰٓأَيُّهَا ٱلنَّاسُ ٱتَّقُواْ رَبَّكُمُ ٱلَّذِي خَلَقَكُم مِّن نَّفۡسٖ وَٰحِدَةٖ وَخَلَقَ مِنۡهَا زَوۡجَهَا وَبَثَّ مِنۡهُمَا رِجَالٗا كَثِيرٗا وَنِسَآءٗۚ وَٱتَّقُواْ ٱللَّهَ ٱلَّذِي تَسَآءَلُونَ بِهِۦ وَٱلۡأَرۡحَامَۚ إِنَّ ٱللَّهَ كَانَ عَلَيۡكُمۡ رَقِيبٗا|وَءَاتُواْ ٱلۡيَتَٰمَىٰٓ أَمۡوَٰلَهُمۡۖ وَلَا تَتَبَدَّلُواْ ٱلۡخَبِيثَ بِٱلطَّيِّبِۖ وَلَا تَأۡكُلُوٓاْ أَمۡوَٰلَهُمۡ إِلَىٰٓ أَمۡوَٰلِكُمۡۚ إِنَّهُۥ كَانَ حُوبٗا كَبِيرٗا|وَإِنۡ خِفۡتُمۡ أَلَّا تُقۡسِطُواْ فِي ٱلۡيَتَٰمَىٰ فَٱنكِحُواْ مَا طَابَ لَكُم مِّنَ ٱلنِّسَآءِ مَثۡنَىٰ وَثُلَٰثَ وَرُبَٰعَۖ فَإِنۡ خِفۡتُمۡ أَلَّا تَعۡدِلُواْ فَوَٰحِدَةً أَوۡ مَا مَلَكَتۡ أَيۡمَٰنُكُمۡۚ ذَٰلِكَ أَدۡنَىٰٓ أَلَّا تَعُولُواْ"},
  {id:5, name:"Mâide", ar:"يَـٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُوٓاْ أَوۡفُواْ بِٱلۡعُقُودِۚ أُحِلَّتۡ لَكُم بَهِيمَةُ ٱلۡأَنۡعَٰمِ إِلَّا مَا يُتۡلَىٰ عَلَيۡكُمۡ غَيۡرَ مُحِلِّي ٱلصَّيۡدِ وَأَنتُمۡ حُرُمٌۗ إِنَّ ٱللَّهَ يَحۡكُمُ مَا يُرِيدُ|يَـٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُواْ لَا تُحِلُّواْ شَعَـٰٓئِرَ ٱللَّهِ وَلَا ٱلشَّهۡرَ ٱلۡحَرَامَ وَلَا ٱلۡهَدۡيَ وَلَا ٱلۡقَلَـٰٓئِدَ وَلَآ ءَآمِّينَ ٱلۡبَيۡتَ ٱلۡحَرَامَ يَبۡتَغُونَ فَضۡلٗا مِّن رَّبِّهِمۡ وَرِضۡوَٰنٗاۚ وَإِذَا حَلَلۡتُمۡ فَٱصۡطَادُواْۚ وَلَا يَجۡرِمَنَّكُمۡ شَنَـَٔانُ قَوۡمٍ أَن صَدُّوكُمۡ عَنِ ٱلۡمَسۡجِدِ ٱلۡحَرَامِ أَن تَعۡتَدُواْۘ وَتَعَاوَنُواْ عَلَى ٱلۡبِرِّ وَٱلتَّقۡوَىٰۖ وَلَا تَعَاوَنُواْ عَلَى ٱلۡإِثۡمِ وَٱلۡعُدۡوَٰنِۚ وَٱتَّقُواْ ٱللَّهَۖ إِنَّ ٱللَّهَ شَدِيدُ ٱلۡعِقَابِ|حُرِّمَتۡ عَلَيۡكُمُ ٱلۡمَيۡتَةُ وَٱلدَّمُ وَلَحۡمُ ٱلۡخِنزِيرِ وَمَآ أُهِلَّ لِغَيۡرِ ٱللَّهِ بِهِۦ وَٱلۡمُنۡخَنِقَةُ وَٱلۡمَوۡقُوذَةُ وَٱلۡمُتَرَدِّيَةُ وَٱلنَّطِيحَةُ وَمَآ أَكَلَ ٱلسَّبُعُ إِلَّا مَا ذَكَّيۡتُمۡ وَمَا ذُبِحَ عَلَى ٱلنُّصُبِ وَأَن تَسۡتَقۡسِمُواْ بِٱلۡأَزۡلَٰمِۚ ذَٰلِكُمۡ فِسۡقٌۗ ٱلۡيَوۡمَ يَئِسَ ٱلَّذِينَ كَفَرُواْ مِن دِينِكُمۡ فَلَا تَخۡشَوۡهُمۡ وَٱخۡشَوۡنِۚ ٱلۡيَوۡمَ أَكۡمَلۡتُ لَكُمۡ دِينَكُمۡ وَأَتۡمَمۡتُ عَلَيۡكُمۡ نِعۡمَتِي وَرَضِيتُ لَكُمُ ٱلۡإِسۡلَٰمَ دِينٗاۚ فَمَنِ ٱضۡطُرَّ فِي مَخۡمَصَةٍ غَيۡرَ مُتَجَانِفٖ لِّإِثۡمٖ فَإِنَّ ٱللَّهَ غَفُورٞ رَّحِيمٞ"},
  {id:6, name:"En'âm", ar:"ٱلۡحَمۡدُ لِلَّهِ ٱلَّذِي خَلَقَ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضَ وَجَعَلَ ٱلظُّلُمَٰتِ وَٱلنُّورَۖ ثُمَّ ٱلَّذِينَ كَفَرُواْ بِرَبِّهِمۡ يَعۡدِلُونَ|هُوَ ٱلَّذِي خَلَقَكُم مِّن طِينٖ ثُمَّ قَضَىٰٓ أَجَلٗاۖ وَأَجَلٞ مُّسَمًّى عِندَهُۥۖ ثُمَّ أَنتُمۡ تَمۡتَرُونَ|وَهُوَ ٱللَّهُ فِي ٱلسَّمَٰوَٰتِ وَفِي ٱلۡأَرۡضِ يَعۡلَمُ سِرَّكُمۡ وَجَهۡرَكُمۡ وَيَعۡلَمُ مَا تَكۡسِبُونَ"},
  {id:7, name:"A'râf", ar:"الٓمٓصٓ|كِتَٰبٌ أُنزِلَ إِلَيۡكَ فَلَا يَكُن فِي صَدۡرِكَ حَرَجٞ مِّنۡهُ لِتُنذِرَ بِهِۦ وَذِكۡرَىٰ لِلۡمُؤۡمِنِينَ|ٱتَّبِعُواْ مَآ أُنزِلَ إِلَيۡكُم مِّن رَّبِّكُمۡ وَلَا تَتَّبِعُواْ مِن دُونِهِۦٓ أَوۡلِيَآءَۗ قَلِيلٗا مَّا تَذَكَّرُونَ"},
  {id:8, name:"Enfâl", ar:"يَسۡـَٔلُونَكَ عَنِ ٱلۡأَنفَالِۖ قُلِ ٱلۡأَنفَالُ لِلَّهِ وَٱلرَّسُولِۖ فَٱتَّقُواْ ٱللَّهَ وَأَصۡلِحُواْ ذَاتَ بَيۡنِكُمۡۖ وَأَطِيعُواْ ٱللَّهَ وَرَسُولَهُۥٓ إِن كُنتُم مُّؤۡمِنِينَ|إِنَّمَا ٱلۡمُؤۡمِنُونَ ٱلَّذِينَ إِذَا ذُكِرَ ٱللَّهُ وَجِلَتۡ قُلُوبُهُمۡ وَإِذَا تُلِيَتۡ عَلَيۡهِمۡ ءَايَٰتُهُۥ زَادَتۡهُمۡ إِيمَٰنٗا وَعَلَىٰ رَبِّهِمۡ يَتَوَكَّلُونَ|ٱلَّذِينَ يُقِيمُونَ ٱلصَّلَوٰةَ وَمِمَّا رَزَقۡنَٰهُمۡ يُنفِقُونَ"},
  {id:9, name:"Tevbe", ar:"بَرَآءَةٞ مِّنَ ٱللَّهِ وَرَسُولِهِۦٓ إِلَى ٱلَّذِينَ عَٰهَدتُّم مِّنَ ٱلۡمُشۡرِكِينَ|فَسِيحُواْ فِي ٱلۡأَرۡضِ أَرۡبَعَةَ أَشۡهُرٖ وَٱعۡلَمُوٓاْ أَنَّكُمۡ غَيۡرُ مُعۡجِزِي ٱللَّهِ وَأَنَّ ٱللَّهَ مُخۡزِي ٱلۡكَٰفِرِينَ|وَأَذَٰنٞ مِّنَ ٱللَّهِ وَرَسُولِهِۦٓ إِلَى ٱلنَّاسِ يَوۡمَ ٱلۡحَجِّ ٱلۡأَكۡبَرِ أَنَّ ٱللَّهَ بَرِيٓءٞ مِّنَ ٱلۡمُشۡرِكِينَ وَرَسُولُهُۥۚ فَإِن تُبۡتُمۡ فَهُوَ خَيۡرٞ لَّكُمۡۖ وَإِن تَوَلَّيۡتُمۡ فَٱعۡلَمُوٓاْ أَنَّكُمۡ غَيۡرُ مُعۡجِزِي ٱللَّهِۗ وَبَشِّرِ ٱلَّذِينَ كَفَرُواْ بِعَذَابٍ أَلِيمٍ"},
  {id:10, name:"Yûnus", ar:"الٓرۚ تِلۡكَ ءَايَٰتُ ٱلۡكِتَٰبِ ٱلۡحَكِيمِ|أَكَانَ لِلنَّاسِ عَجَبًا أَنۡ أَوۡحَيۡنَآ إِلَىٰ رَجُلٖ مِّنۡهُمۡ أَنۡ أَنذِرِ ٱلنَّاسَ وَبَشِّرِ ٱلَّذِينَ ءَامَنُوٓاْ أَنَّ لَهُمۡ قَدَمَ صِدۡقٍ عِندَ رَبِّهِمۡۗ قَالَ ٱلۡكَٰفِرُونَ إِنَّ هَٰذَا لَسَٰحِرٞ مُّبِينٌ|إِنَّ رَبَّكُمُ ٱللَّهُ ٱلَّذِي خَلَقَ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضَ فِي سِتَّةِ أَيَّامٖ ثُمَّ ٱسۡتَوَىٰ عَلَى ٱلۡعَرۡشِۖ يُدَبِّرُ ٱلۡأَمۡرَۖ مَا مِن شَفِيعٍ إِلَّا مِنۢ بَعۡدِ إِذۡنِهِۦۚ ذَٰلِكُمُ ٱللَّهُ رَبُّكُمۡ فَٱعۡبُدُوهُۚ أَفَلَا تَذَكَّرُونَ"},
  {id:11, name:"Hûd", ar:"الٓرۚ كِتَٰبٌ أُحۡكِمَتۡ ءَايَٰتُهُۥ ثُمَّ فُصِّلَتۡ مِن لَّدُنۡ حَكِيمٍ خَبِيرٍ|أَلَّا تَعۡبُدُوٓاْ إِلَّا ٱللَّهَۚ إِنَّنِي لَكُم مِّنۡهُ نَذِيرٞ وَبَشِيرٞ|وَأَنِ ٱسۡتَغۡفِرُواْ رَبَّكُمۡ ثُمَّ تُوبُوٓاْ إِلَيۡهِ يُمَتِّعۡكُم مَّتَٰعًا حَسَنًا إِلَىٰٓ أَجَلٖ مُّسَمّٗى وَيُؤۡتِ كُلَّ ذِي فَضۡلٖ فَضۡلَهُۥۖ وَإِن تَوَلَّوۡاْ فَإِنِّيٓ أَخَافُ عَلَيۡكُمۡ عَذَابَ يَوۡمٖ كَبِيرٍ"},
  {id:12, name:"Yûsuf", ar:"الٓرۚ تِلۡكَ ءَايَٰتُ ٱلۡكِتَٰبِ ٱلۡمُبِينِ|إِنَّآ أَنزَلۡنَٰهُ قُرۡءَٰنًا عَرَبِيّٗا لَّعَلَّكُمۡ تَعۡقِلُونَ|نَحۡنُ نَقُصُّ عَلَيۡكَ أَحۡسَنَ ٱلۡقَصَصِ بِمَآ أَوۡحَيۡنَآ إِلَيۡكَ هَٰذَا ٱلۡقُرۡءَانَ وَإِن كُنتَ مِن قَبۡلِهِۦ لَمِنَ ٱلۡغَٰفِلِينَ"},
  {id:13, name:"Ra'd", ar:"الٓمٓرۚ تِلۡكَ ءَايَٰتُ ٱلۡكِتَٰبِۗ وَٱلَّذِيٓ أُنزِلَ إِلَيۡكَ مِن رَّبِّكَ ٱلۡحَقُّ وَلَٰكِنَّ أَكۡثَرَ ٱلنَّاسِ لَا يُؤۡمِنُونَ|ٱللَّهُ ٱلَّذِي رَفَعَ ٱلسَّمَٰوَٰتِ بِغَيۡرِ عَمَدٖ تَرَوۡنَهَاۖ ثُمَّ ٱسۡتَوَىٰ عَلَى ٱلۡعَرۡشِۖ وَسَخَّرَ ٱلشَّمۡسَ وَٱلۡقَمَرَۖ كُلّٞ يَجۡرِي لِأَجَلٖ مُّسَمّٗىۚ يُدَبِّرُ ٱلۡأَمۡرَ يُفَصِّلُ ٱلۡأٓيَٰتِ لَعَلَّكُم بِلِقَآءِ رَبِّكُمۡ تُوقِنُونَ|وَهُوَ ٱلَّذِي مَدَّ ٱلۡأَرۡضَ وَجَعَلَ فِيهَا رَوَٰسِيَ وَأَنۡهَٰرٗاۖ وَمِن كُلِّ ٱلثَّمَرَٰتِ جَعَلَ فِيهَا زَوۡجَيۡنِ ٱثۡنَيۡنِۖ يُغۡشِي ٱلَّيۡلَ ٱلنَّهَارَۚ إِنَّ فِي ذَٰلِكَ لَأٓيَٰتٖ لِّقَوۡمٖ يَتَفَكَّرُونَ"},
  {id:14, name:"İbrâhîm", ar:"الٓرۚ كِتَٰبٌ أَنزَلۡنَٰهُ إِلَيۡكَ لِتُخۡرِجَ ٱلنَّاسَ مِنَ ٱلظُّلُمَٰتِ إِلَى ٱلنُّورِ بِإِذۡنِ رَبِّهِمۡ إِلَىٰ صِرَٰطِ ٱلۡعَزِيزِ ٱلۡحَمِيدِ|ٱللَّهِ ٱلَّذِي لَهُۥ مَا فِي ٱلسَّمَٰوَٰتِ وَمَا فِي ٱلۡأَرۡضِۗ وَوَيۡلٞ لِّلۡكَٰفِرِينَ مِنۡ عَذَابٖ شَدِيدٍ|ٱلَّذِينَ يَسۡتَحِبُّونَ ٱلۡحَيَوٰةَ ٱلدُّنۡيَا عَلَى ٱلۡأٓخِرَةِ وَيَصُدُّونَ عَن سَبِيلِ ٱللَّهِ وَيَبۡغُونَهَا عِوَجًاۚ أُوْلَـٰٓئِكَ فِي ضَلَٰلِۭ بَعِيدٖ"},
  {id:15, name:"Hicr", ar:"الٓرۚ تِلۡكَ ءَايَٰتُ ٱلۡكِتَٰبِ وَقُرۡءَانٖ مُّبِينٖ|رُّبَمَا يَوَدُّ ٱلَّذِينَ كَفَرُواْ لَوۡ كَانُواْ مُسۡلِمِينَ|ذَرۡهُمۡ يَأۡكُلُواْ وَيَتَمَتَّعُواْ وَيُلۡهِهِمُ ٱلۡأَمَلُۖ فَسَوۡفَ يَعۡلَمُونَ"},
  {id:16, name:"Nahl", ar:"أَتَىٰٓ أَمۡرُ ٱللَّهِ فَلَا تَسۡتَعۡجِلُوهُۚ سُبۡحَٰنَهُۥ وَتَعَٰلَىٰ عَمَّا يُشۡرِكُونَ|يُنَزِّلُ ٱلۡمَلَـٰٓئِكَةَ بِٱلرُّوحِ مِنۡ أَمۡرِهِۦ عَلَىٰ مَن يَشَآءُ مِنۡ عِبَادِهِۦٓ أَنۡ أَنذِرُوٓاْ أَنَّهُۥ لَآ إِلَٰهَ إِلَّآ أَنَا۠ فَٱتَّقُونِ|خَلَقَ ٱلسَّمَٰوَٰتِ وَٱلۡأَرۡضَ بِٱلۡحَقِّۚ تَعَٰلَىٰ عَمَّا يُشۡرِكُونَ"},

// ── SES: everyayah.com hafız sesi ────────────────────────────────────────────
const RECITERS = [
  'Abdul_Basit_Murattal_64kbps',
  'Alafasy_64kbps',
  'Husary_64kbps',
];
let currentReciter = RECITERS[0];
let audioQueue = [];
let currentAudio = null;
let isPlaying = false;

function pad3(n){ return String(n).padStart(3,'0'); }

function buildUrls(surahId, ayahCount){
  return Array.from({length:ayahCount},(_,i)=>
    `https://everyayah.com/data/${currentReciter}/${pad3(surahId)}${pad3(i+1)}.mp3`
  );
}

function stopAudio(btnEl){
  isPlaying = false;
  audioQueue = [];
  if(currentAudio){
    currentAudio.pause();
    currentAudio.src = '';
    currentAudio = null;
  }
  if(btnEl){
    btnEl.textContent = '🔊 Sesli Dinle';
    btnEl.classList.remove('playing');
    btnEl.disabled = false;
  }
}

function playQueue(urls, btnEl){
  if(isPlaying){
    stopAudio(btnEl);
    return;
  }
  
  stopAudio(btnEl);
  if(!urls.length) return;
  
  isPlaying = true;
  audioQueue = [...urls];
  btnEl.textContent = '⏳ Yükleniyor...';
  btnEl.classList.add('playing');
  btnEl.disabled = true;

  function playNext(){
    if(!isPlaying || !audioQueue.length){
      stopAudio(btnEl);
      return;
    }
    const url = audioQueue.shift();
    const audio = new Audio(url);
    audio.crossOrigin = 'anonymous';
    currentAudio = audio;

    audio.oncanplay = () => {
      btnEl.textContent = '🔊 Dinleniyor...';
      btnEl.disabled = false;
    };
    audio.onended = playNext;
    audio.onerror = () => {
      console.warn('Ses yüklenemedi:', url);
      playNext();
    };
    audio.play().catch(() => playNext());
  }
  playNext();
}

function playCurrentSurah(btnEl){
  if(!setQ.length || idx>=setQ.length) return;
  const s = setQ[idx].s;
  const urls = buildUrls(s.id, 3);
  playQueue(urls, btnEl);
}

function createConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);
  
  const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff6fb7', '#a66cff', '#ff9f43', '#00d2d3'];
  const shapes = ['■', '●', '▲', '★', '♦', '♥', '✦', '⬡'];
  
  for(let i = 0; i < 80; i++) {
    const confetti = document.createElement('div');
    confetti.className = 'confetti';
    confetti.textContent = shapes[Math.floor(Math.random() * shapes.length)];
    confetti.style.left = Math.random() * 100 + '%';
    confetti.style.color = colors[Math.floor(Math.random() * colors.length)];
    confetti.style.fontSize = (Math.random() * 20 + 10) + 'px';
    confetti.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
    confetti.style.animationDelay = (Math.random() * 1.5) + 's';
    container.appendChild(confetti);
  }
  
  // 3 saniye sonra temizle
  setTimeout(() => {
    container.remove();
  }, 3500);
}

const SET = 10;

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function genSet(){
  const names = DB.map(s=>s.name);
  return shuffle([...DB]).slice(0,SET).map(s=>({
    s, correct:s.name,
    opts:shuffle([s.name,...shuffle(names.filter(n=>n!==s.name)).slice(0,2)])
  }));
}

function adjustFontSize(){
  const sec = document.querySelector('.arabic-section');
  const el  = document.getElementById('arabicVerses');
  if(!sec||!el) return;
  const available = sec.clientHeight - 50;
  let fs = Math.min(window.innerHeight*0.038, window.innerWidth*0.05, 32);
  el.style.fontSize = fs+'px';
  for(let i=0;i<8;i++){
    if(el.scrollHeight > available+20 && fs>12){
      fs = Math.max(12, fs-2);
      el.style.fontSize=fs+'px';
    } else break;
  }
}

function render(){
  clearTimeout(autoTmr);
  if(idx>=setQ.length){
    document.getElementById('feedbackMsg').textContent='🎉 Set tamamlandı! Yeni Set ile devam edin.';
    document.getElementById('nextBtn').disabled=true;
    document.getElementById('listenBtn').disabled=true;
    return;
  }
  document.getElementById('nextBtn').disabled=false;
  document.getElementById('listenBtn').disabled=false;
  answered=false;
  const q=setQ[idx];

  document.getElementById('qNum').textContent=idx+1;
  document.getElementById('qTotal').textContent=SET;
  document.getElementById('sureLabel').textContent=`✨ İlk 3 Ayet · Sure ${q.s.id}`;

  // TÜM 3 AYETİ GÖSTER
  const lines = q.s.ar.split('|');
  document.getElementById('arabicVerses').innerHTML =
    lines.map((l,i)=>`<span class="ayet-line"><span style="color:#9a7010;font-size:.75em;margin-left:6px;direction:ltr">﴿${i+1}﴾</span> ${l}</span>`).join('');

  const oc=document.getElementById('optionsContainer');
  oc.innerHTML='';
  q.opts.forEach(opt=>{
    const b=document.createElement('button');
    b.className='opt-btn'; 
    b.textContent=opt.toLocaleUpperCase('tr');
    b.addEventListener('click',()=>handleAnswer(opt));
    oc.appendChild(b);
  });

  document.getElementById('feedbackMsg').textContent='💡 Bir cevap seçin';
  requestAnimationFrame(adjustFontSize);
}

function handleAnswer(sel){
  if(answered) return;
  answered=true;
  const q=setQ[idx];
  const ok=sel===q.correct;
  
  if(ok){
    score++;
    document.getElementById('scoreNum').textContent=score;
    document.getElementById('feedbackMsg').textContent='✅ Doğru! +1 puan 🎉';
    // Alkış efekti
    createConfetti();
  } else {
    document.getElementById('feedbackMsg').textContent=`❌ Yanlış! Doğru: ${q.correct.toLocaleUpperCase('tr')}`;
  }
  
  document.querySelectorAll('.opt-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===q.correct.toLocaleUpperCase('tr')){
      b.classList.add('opt-correct');
    } else if(b.textContent===sel.toLocaleUpperCase('tr') && !ok){
      b.classList.add('opt-wrong');
    }
  });
  
  autoTmr=setTimeout(advance, 2000);
}

function advance(){
  clearTimeout(autoTmr);
  const btn = document.getElementById('listenBtn');
  stopAudio(btn);
  if(!answered){document.getElementById('feedbackMsg').textContent='⚠️ Önce cevap seçin!';return;}
  idx++;render();
}

function resetGame(){
  clearTimeout(autoTmr);
  const btn = document.getElementById('listenBtn');
  stopAudio(btn);
  setQ=genSet();idx=0;score=0;answered=false;
  document.getElementById('scoreNum').textContent='0';
  render();
}

document.getElementById('nextBtn').addEventListener('click',advance);
document.getElementById('resetBtn').addEventListener('click',resetGame);
document.getElementById('listenBtn').addEventListener('click',function(){ playCurrentSurah(this); });
window.addEventListener('resize',adjustFontSize);

// ── İLK AYET LİSTESİ ──────────────────────────────────────────────────────────
function buildList(){
  const body = document.getElementById('listBody');
  body.innerHTML = [...DB]
    .sort((a,b)=>a.id-b.id)
    .map(s=>{
      const ayetler = s.ar.split('|').slice(0,2);
      const ayetHtml = ayetler.map((a,i)=>
        `<div class="list-ayet"><span class="list-ayet-no">﴿${i+1}﴾</span> ${a}</div>`
      ).join('');
      return `<div class="list-item">
        <div class="list-num">${s.id}</div>
        <div class="list-meta">
          <div class="list-name">${s.name}</div>
          ${ayetHtml}
        </div>
      </div>`;
    }).join('');
}

function openList(){
  buildList();
  const btn = document.getElementById('listenBtn');
  stopAudio(btn);                       // liste açılınca sesi durdur
  document.getElementById('listOverlay').classList.add('open');
}
function closeList(){
  document.getElementById('listOverlay').classList.remove('open');
}

document.getElementById('listBtn').addEventListener('click',openList);
document.getElementById('listCloseBtn').addEventListener('click',closeList);
// overlay boşluğuna tıklayınca da kapat
document.getElementById('listOverlay').addEventListener('click',function(e){
  if(e.target===this) closeList();
});

setQ=genSet();
render();
</script>
</body>
