<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Kur'an Sure Tanıma</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

html,body{
  height:100%;
  width:100%;
  overflow:hidden;
  font-family:'Segoe UI','Tahoma',serif;
  background:#0a1f10;
}

/* ══ ANA ÇERÇEVE: ekranın %95'i ══ */
.frame{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:2vh 2vw;
}

/* ══ KİTAP SAYFASI ══ */
.page{
  width:100%;
  height:95vh;
  max-width:860px;
  background:linear-gradient(160deg,#fdf6e0 0%,#f4e8c0 55%,#ecdba0 100%);
  border-radius:4px 18px 18px 4px;
  box-shadow:
    -8px 0 0 #b8920a,        /* sol cilt şeridi */
    0 0 0 3px #c9a520,       /* altın kenar */
    8px 14px 60px rgba(0,0,0,.65),
    -2px 2px 20px rgba(0,0,0,.3);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  position:relative;
}

/* Sayfa çizgi dokusu */
.page::before{
  content:'';
  position:absolute;
  inset:0;
  background-image:repeating-linear-gradient(
    transparent,
    transparent 39px,
    rgba(160,130,40,.13) 39px,
    rgba(160,130,40,.13) 40px
  );
  pointer-events:none;
  z-index:0;
}

/* Sol kenar kırmızı çizgi (klasik defter) */
.page::after{
  content:'';
  position:absolute;
  top:0; bottom:0; left:52px;
  width:1.5px;
  background:rgba(200,80,60,.25);
  z-index:1;
}

/* ══ ÜST BAR: HUD + Dinle ══ */
.top-bar{
  position:relative;
  z-index:2;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 18px 8px 20px;
  border-bottom:1.5px solid rgba(160,130,40,.25);
  background:rgba(255,248,220,.55);
  flex-shrink:0;
  flex-wrap:wrap;
  gap:6px;
}

.hud-left{
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}
.hud-chip{
  background:rgba(80,50,5,.08);
  border:1px solid rgba(160,120,20,.3);
  border-radius:30px;
  padding:3px 12px;
  font-size:.78rem;
  font-weight:700;
  color:#4a3205;
}
.score-chip{
  background:#1a4f2e;
  color:#c8f0a0;
  border:1px solid #2a7040;
}

.hud-right{
  display:flex;
  align-items:center;
  gap:8px;
}
.listen-btn{
  background:#2a6040;
  border:none;
  color:#e0f8d0;
  font-size:.8rem;
  padding:6px 14px;
  border-radius:30px;
  cursor:pointer;
  font-weight:700;
  font-family:inherit;
  display:flex;
  align-items:center;
  gap:6px;
  transition:.15s;
  box-shadow:0 2px 6px rgba(0,0,0,.2);
}
.listen-btn:hover{background:#3a8050;}
.listen-btn:active{transform:scale(.96);}
.listen-btn.playing{background:#8a3020;}
.listen-btn.playing:hover{background:#a04030;}

.reset-btn{
  background:transparent;
  border:1px solid rgba(160,120,20,.4);
  color:#6a4a08;
  border-radius:30px;
  padding:5px 12px;
  font-size:.76rem;
  cursor:pointer;
  font-family:inherit;
  font-weight:700;
  transition:.15s;
}
.reset-btn:hover{background:rgba(160,120,20,.12);}

/* ══ KİTAP İÇ ALANI ══ */
.page-body{
  position:relative;
  z-index:2;
  flex:1;
  display:flex;
  flex-direction:column;
  padding:0 20px 12px 60px; /* sol kırmızı çizginin sağı */
  overflow:hidden;
  min-height:0;
}

/* ══ ARAPÇA METİN ALANI (büyük, %55 yükseklik) ══ */
.arabic-section{
  flex:0 0 auto;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:16px 8px 12px 0;
  border-bottom:1.5px solid rgba(160,130,40,.22);
  min-height:0;
}

.sure-label{
  font-size:.72rem;
  font-weight:700;
  color:#8a6520;
  letter-spacing:.8px;
  text-transform:uppercase;
  margin-bottom:12px;
  opacity:.8;
}

.arabic-text{
  direction:rtl;
  font-family:'Amiri','Traditional Arabic','Scheherazade New','Times New Roman',serif;
  color:#1a2010;
  text-align:right;
  line-height:1.8;
}

.ayet-line{
  display:block;
  margin-bottom:6px;
  padding-bottom:6px;
  border-bottom:1px solid rgba(160,130,40,.12);
}
.ayet-line:last-child{
  border-bottom:none;
  margin-bottom:0;
}

/* ══ SORU + SEÇENEKLER ALANI ══ */
.question-section{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:14px 0 8px;
  min-height:0;
  overflow:hidden;
}

.question-label{
  font-size:.8rem;
  font-weight:700;
  color:#6a4a08;
  margin-bottom:10px;
  opacity:.85;
}

.options{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:8px;
  overflow-y:auto;
  padding-right:4px;
}

.opt-btn{
  background:rgba(30,60,20,.85);
  border:1.5px solid rgba(80,160,60,.45);
  border-radius:50px;
  padding:0;
  font-size:1rem;
  font-weight:800;
  color:#c8f0a0;
  cursor:pointer;
  text-align:center;
  transition:.15s;
  font-family:inherit;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:44px;
  padding:10px 18px;
  flex-shrink:0;
  letter-spacing:1.5px;
  text-transform:uppercase;
}
.opt-btn:hover:not([disabled]){
  background:rgba(40,90,25,.95);
  border-color:rgba(120,220,80,.7);
  color:#e8ffe0;
}
.opt-correct{
  background:#15457a !important;
  border-color:#4fa0e8 !important;
  color:#d8ecff !important;
  letter-spacing:1.5px;
}
.opt-wrong{
  background:#6b1f12 !important;
  border-color:#e07060 !important;
  color:#ffd8d0 !important;
  text-decoration:line-through;
  letter-spacing:1.5px;
}
.opt-btn[disabled]{cursor:default;}

/* ══ ALT BİLGİ SATIRI ══ */
.bottom-bar{
  position:relative;
  z-index:2;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:8px 18px 10px 60px;
  border-top:1.5px solid rgba(160,130,40,.22);
  background:rgba(255,248,220,.4);
  flex-shrink:0;
  flex-wrap:wrap;
  gap:8px;
}

.feedback{
  font-size:.82rem;
  font-weight:600;
  color:#5a3e08;
  flex:1;
  min-width:0;
}

.next-btn{
  background:linear-gradient(135deg,#9e6610,#c8900c);
  border:none;
  padding:8px 22px;
  font-size:.88rem;
  font-weight:800;
  border-radius:40px;
  color:#fff8e0;
  cursor:pointer;
  font-family:inherit;
  letter-spacing:.3px;
  box-shadow:0 3px 0 #6a4408, 0 4px 12px rgba(0,0,0,.25);
  transition:.12s;
  white-space:nowrap;
  flex-shrink:0;
}
.next-btn:hover{background:linear-gradient(135deg,#b87812,#e0a814);}
.next-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #6a4408;}
.next-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}

/* ══ FONT BOYUTU HESAPLAMA: container yüksekliğine göre ══ */
/* Büyük ekran */
@media(min-height:700px){
  .arabic-text{ font-size:clamp(1.4rem,3.2vh,2.2rem); }
  .arabic-section{ flex: 0 0 52%; }
}
/* Orta ekran */
@media(max-height:699px) and (min-height:500px){
  .arabic-text{ font-size:clamp(1.1rem,2.8vh,1.7rem); }
  .arabic-section{ flex: 0 0 48%; }
}
/* Küçük ekran */
@media(max-height:499px){
  .arabic-text{ font-size:1rem; line-height:1.6; }
  .arabic-section{ flex: 0 0 44%; }
  .opt-btn{ min-height:36px; font-size:.85rem; }
}

/* Geniş ekranlarda yatay padding artır */
@media(min-width:600px){
  .page-body{ padding-left:70px; padding-right:28px; }
}
</style>
</head>
<body>

<div class="frame">
<div class="page">

  <!-- ÜST BAR -->
  <div class="top-bar">
    <div class="hud-left">
      <div class="hud-chip">📖 Soru <span id="qNum">1</span>/<span id="qTotal">10</span></div>
      <div class="hud-chip score-chip">⭐ <span id="scoreNum">0</span> puan</div>
    </div>
    <div class="hud-right">
      <button class="listen-btn" id="listenBtn">🔊 Sesli Dinle</button>
      <button class="reset-btn" id="resetBtn">🔄 Yeni Set</button>
    </div>
  </div>

  <!-- KİTAP GÖVDE -->
  <div class="page-body">

    <!-- ARAPÇA ALAN -->
    <div class="arabic-section">
      <div class="sure-label" id="sureLabel">✨ İlk 3 Ayet · Arapça</div>
      <div class="arabic-text" id="arabicVerses"></div>
    </div>

    <!-- SORU + SEÇENEKLER -->
    <div class="question-section">
      <div class="question-label">🌙 Bu hangi sure?</div>
      <div class="options" id="optionsContainer"></div>
    </div>

  </div><!-- /page-body -->

  <!-- ALT BAR -->
  <div class="bottom-bar">
    <div class="feedback" id="feedbackMsg">💡 Bir cevap seçin</div>
    <button class="next-btn" id="nextBtn">⏩ Sonraki</button>
  </div>

</div><!-- /page -->
</div><!-- /frame -->

// ── SES: everyayah.com hafız sesi ────────────────────────────────────────────
// everyayah.com/recitations/{reciter}/{surah:3}/{ayah:3}.mp3
// Örnek: /recitations/Abdul_Basit_Murattal_64kbps/001/001.mp3
// İlk 3 ayeti sırayla çalar

const RECITERS = [
  'Abdul_Basit_Murattal_64kbps',   // Abdulbasit Abdussamed (Murattil)
  'Alafasy_64kbps',                 // Mişari Raşid el-Afasi
  'Husary_64kbps',                  // Mahmud Halil el-Husari
];
let currentReciter = RECITERS[0];
let audioQueue = [];
let currentAudio = null;
let isPlaying = false;

function pad3(n){ return String(n).padStart(3,'0'); }

function buildUrls(surahId, ayahCount){
  return Array.from({length:ayahCount},(_,i)=>
    `https://everyayah.com/data/${currentReciter}/${pad3(surahId)}${pad3(i+1)}.mp3`
  );
}

function resetListenBtn(){
  const b=document.getElementById('listenBtn');
  if(b){ b.textContent='🔊 Sesli Dinle'; b.disabled=false; b.classList.remove('playing'); }
}

function stopAudio(){
  isPlaying=false;
  audioQueue=[];
  if(currentAudio){
    currentAudio.pause();
    currentAudio.src='';
    currentAudio=null;
  }
}

function playQueue(urls, btnEl){
  stopAudio();
  if(!urls.length) return;
  isPlaying=true;
  audioQueue=[...urls];
  if(btnEl){ btnEl.textContent='⏳ Yükleniyor...'; btnEl.classList.add('playing'); }

  function playNext(){
    if(!isPlaying || !audioQueue.length){
      resetListenBtn();
      isPlaying=false; return;
    }
    const url=audioQueue.shift();
    const audio=new Audio(url);
    audio.crossOrigin='anonymous';
    currentAudio=audio;

    audio.oncanplay=()=>{
      if(isPlaying && btnEl){ btnEl.textContent='⏹️ Durdur'; btnEl.classList.add('playing'); }
    };
    audio.onended=playNext;
    audio.onerror=()=>{
      // Bu kari için hata → bir sonrakini dene ya da dur
      console.warn('Ses yüklenemedi:',url);
      playNext();
    };
    audio.play().catch(()=>playNext());
  }
  playNext();
}

function playCurrentSurah(btnEl){
  if(!setQ.length || idx>=setQ.length) return;
  const s=setQ[idx].s;
  // İlk 3 ayet (Tevbe suresi 1 numaralı ayet olmadığından 1-3 yine de çalışır)
  const urls=buildUrls(s.id, 3);
  playQueue(urls, btnEl);
}

// Toggle: çalıyorsa durdur, değilse başlat
function toggleListen(btnEl){
  if(isPlaying){
    stopAudio();
    resetListenBtn();
  } else {
    playCurrentSurah(btnEl);
  }
}

// ── ALKIŞ EFEKTİ (ses + konfeti) ─────────────────────────────────────────────
let applauseCtx=null;
function playApplause(){
  // WebAudio ile kısa bir alkış/gürültü efekti üret (harici dosya gerektirmez)
  try{
    applauseCtx = applauseCtx || new (window.AudioContext||window.webkitAudioContext)();
    const ctx=applauseCtx;
    if(ctx.state==='suspended') ctx.resume();
    const dur=1.1;
    const buf=ctx.createBuffer(1, ctx.sampleRate*dur, ctx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<data.length;i++){
      const t=i/data.length;
      // çoğalan/sönen zarf + rastgele "el çırpma" patlamaları
      const env=Math.sin(Math.PI*t)*(1-t*0.3);
      const clap=(Math.random()*2-1)*(Math.random()<0.06?1:0.25);
      data[i]=clap*env*0.5;
    }
    const src=ctx.createBufferSource();
    src.buffer=buf;
    const filt=ctx.createBiquadFilter();
    filt.type='bandpass'; filt.frequency.value=1800; filt.Q.value=0.7;
    const gain=ctx.createGain(); gain.gain.value=0.9;
    src.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
    src.start();
  }catch(e){ /* ses desteklenmiyorsa sessizce geç */ }
}

function launchConfetti(){
  const colors=['#4fa0e8','#15457a','#ffd36b','#5ec87a','#e8709b','#ffffff'];
  const N=80;
  const wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;';
  document.body.appendChild(wrap);
  for(let i=0;i<N;i++){
    const p=document.createElement('div');
    const sz=6+Math.random()*8;
    const left=Math.random()*100;
    const dur=1.6+Math.random()*1.4;
    const delay=Math.random()*0.25;
    const rot=Math.random()*360;
    const drift=(Math.random()*2-1)*120;
    p.style.cssText=`position:absolute;top:-20px;left:${left}%;width:${sz}px;height:${sz*0.5}px;`
      +`background:${colors[i%colors.length]};opacity:0;`
      +`border-radius:${Math.random()<0.5?'50%':'2px'};`
      +`transform:rotate(${rot}deg);`
      +`animation:confFall ${dur}s ${delay}s ease-in forwards;`
      +`--drift:${drift}px;`;
    wrap.appendChild(p);
  }
  setTimeout(()=>wrap.remove(),3600);
}
// konfeti animasyonu için stil enjekte et
(function(){
  if(document.getElementById('confettiStyle')) return;
  const st=document.createElement('style');
  st.id='confettiStyle';
  st.textContent='@keyframes confFall{0%{opacity:0;transform:translate(0,0) rotate(0)}'
    +'10%{opacity:1}100%{opacity:0;transform:translate(var(--drift),105vh) rotate(720deg)}}';
  document.head.appendChild(st);
})();

function celebrate(){
  playApplause();
  launchConfetti();
}

// ── OYUN ─────────────────────────────────────────────────────────────────────
let setQ=[],idx=0,score=0,answered=false,autoTmr=null;
const SET=10;

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function genSet(){
  const names=DB.map(s=>s.name);
  return shuffle([...DB]).slice(0,SET).map(s=>({
    s, correct:s.name,
    opts:shuffle([s.name,...shuffle(names.filter(n=>n!==s.name)).slice(0,2)])
  }));
}

function adjustFontSize(){
  // Arapça metin alanının yüksekliğine göre font ayarla
  const sec = document.querySelector('.arabic-section');
  const el  = document.getElementById('arabicVerses');
  if(!sec||!el) return;
  const available = sec.clientHeight - 50; // label için boşluk
  let fs = Math.min(window.innerHeight*0.038, window.innerWidth*0.05, 32);
  el.style.fontSize = fs+'px';
  // Taşıyorsa küçült
  for(let i=0;i<8;i++){
    if(el.scrollHeight > available+20 && fs>12){
      fs = Math.max(12, fs-2);
      el.style.fontSize=fs+'px';
    } else break;
  }
}

function render(){
  clearTimeout(autoTmr);
  if(idx>=setQ.length){
    document.getElementById('feedbackMsg').textContent='🎉 Set tamamlandı! Yeni Set ile devam edin.';
    document.getElementById('nextBtn').disabled=true;
    document.getElementById('listenBtn').disabled=true;
    return;
  }
  document.getElementById('nextBtn').disabled=false;
  document.getElementById('listenBtn').disabled=false;
  answered=false;
  const q=setQ[idx];

  document.getElementById('qNum').textContent=idx+1;
  document.getElementById('qTotal').textContent=SET;
  document.getElementById('sureLabel').textContent=`✨ İlk 3 Ayet · Sure ${q.s.id}`;

  const lines=q.s.ar.split('|');
  document.getElementById('arabicVerses').innerHTML =
    lines.map((l,i)=>`<span class="ayet-line"><span style="color:#9a7010;font-size:.75em;margin-left:6px;direction:ltr">﴿${i+1}﴾</span> ${l}</span>`).join('');

  const oc=document.getElementById('optionsContainer');
  oc.innerHTML='';
  q.opts.forEach(opt=>{
    const b=document.createElement('button');
    b.className='opt-btn'; b.textContent=opt.toLocaleUpperCase('tr');
    b.addEventListener('click',()=>handleAnswer(opt));
    oc.appendChild(b);
  });

  document.getElementById('feedbackMsg').textContent='💡 Bir cevap seçin';

  // font boyutunu bir sonraki frame'de ayarla (DOM render sonrası)
  requestAnimationFrame(adjustFontSize);
}

function handleAnswer(sel){
  if(answered) return;
  answered=true;
  const q=setQ[idx];
  const ok=sel===q.correct;
  if(ok){score++;document.getElementById('scoreNum').textContent=score;celebrate();}
  document.getElementById('feedbackMsg').textContent=
    ok?`✅ Doğru! +1 puan`:`❌ Yanlış! Doğru: ${q.correct.toLocaleUpperCase('tr')}`;
  document.querySelectorAll('.opt-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===q.correct.toLocaleUpperCase('tr')) b.classList.add('opt-correct');
    else if(b.textContent===sel.toLocaleUpperCase('tr')&&!ok) b.classList.add('opt-wrong');
  });
  autoTmr=setTimeout(advance,1500);
}

function advance(){
  clearTimeout(autoTmr);
  stopAudio();
  resetListenBtn();
  if(!answered){document.getElementById('feedbackMsg').textContent='⚠️ Önce cevap seçin!';return;}
  idx++;render();
}

function resetGame(){
  clearTimeout(autoTmr);
  stopAudio();
  resetListenBtn();
  setQ=genSet();idx=0;score=0;answered=false;
  document.getElementById('scoreNum').textContent='0';
  render();
}

document.getElementById('nextBtn').addEventListener('click',advance);
document.getElementById('resetBtn').addEventListener('click',resetGame);
document.getElementById('listenBtn').addEventListener('click',function(){ toggleListen(this); });
window.addEventListener('resize',adjustFontSize);

setQ=genSet();
render();
</script>
